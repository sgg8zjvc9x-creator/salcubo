<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S al Cubo (S³) | Sandra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #f0f6fc;
            background-image: radial-gradient(#ffffff10 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .apple-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .gradient-text {
            background: linear-gradient(90deg, #10b981, #3b82f6, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Modal Estilo iOS */
        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            width: 100%;
            max-width: 440px;
            position: relative;
        }
        .video-container {
            position: relative;
            padding-bottom: 177.77%; /* Proporción 9:16 vertical para Shorts/HeyGen */
            height: 0;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .contact-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        /* Efecto Margarita Giratoria Minimalista */
        .margarita-container {
            position: relative;
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .margarita-icon {
            font-size: 76px;
            color: #ffffff;
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.4));
            animation: rotate-margarita 20s linear infinite;
        }
        .margarita-center {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 15px #FFD700;
            z-index: 2;
        }
        @keyframes rotate-margarita {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    
    <header class="max-w-6xl mx-auto text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tight">
            <span class="gradient-text">S al Cubo</span><span class="text-blue-400 text-3xl align-top">³</span>
        </h1>
        <p class="text-slate-400 text-lg">Innovación Educativa & Esencia Marcial</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- SECCIÓN SEÑO -->
        <section class="apple-glass p-8 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-emerald-400 text-3xl mb-6">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h2 class="text-2xl font-bold mb-4">Seño</h2>
            <p class="text-slate-400 text-sm leading-relaxed">Próximamente: Situaciones de aprendizaje y gamificación.</p>
        </section>

        <!-- SECCIÓN SENSEI -->
        <section class="apple-glass p-8 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center text-blue-400 text-3xl mb-6">
                <i class="fa-solid fa-hand-fist"></i>
            </div>
            <h2 class="text-2xl font-bold mb-4">Sensei</h2>
            <p class="text-slate-400 text-sm leading-relaxed">Disciplina y valores marciales aplicados al aula.</p>
        </section>

        <!-- SECCIÓN SANDRA (CON MARGARITA FIJA) -->
        <section onclick="openVideo()" class="apple-glass p-8 flex flex-col items-center text-center cursor-pointer border-indigo-500/30 hover:bg-white/5 group">
            <div class="margarita-container mb-6 transition-transform group-hover:scale-105">
                <div class="margarita-center"></div>
                <i class="fa-solid fa-asterisk margarita-icon"></i>
            </div>
            <h2 class="text-2xl font-bold mb-4">Sandra</h2>
            <p class="text-slate-400 text-sm leading-relaxed mb-4">Pulsa para conocerme y contactar conmigo.</p>
            <span class="text-indigo-400 text-xs font-bold uppercase tracking-widest flex items-center">
                Ver Vídeo <i class="fa-solid fa-play ml-2"></i>
            </span>
        </section>

    </main>

    <!-- MODAL DE VÍDEO Y CONTACTO STYLE iOS (YOUTUBE INTEGRADO) -->
    <div id="video-modal">
        <div class="modal-content">
            <button onclick="closeVideo()" class="absolute -top-12 right-0 text-white text-2xl opacity-70 hover:opacity-100">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <!-- Contenedor del reproductor de YouTube optimizado en formato vertical 9:16 -->
            <div class="video-container">
                <iframe id="yt-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <!-- PANEL DE CONTACTO -->
            <div class="mt-6 grid grid-cols-1 gap-3">
                <a href="mailto:sanquipa03@gmail.com?subject=Contacto%20desde%20tu%20Web%20-%20S%20al%20Cubo&body=¡Hola%20Sandra!%20He%20visto%20tu%20vídeo%20de%20presentación%20y%20me%20gustaría%20conectar%20contigo..." class="contact-btn">
                    <i class="fa-solid fa-envelope mr-3 text-emerald-400"></i> sanquipa03@gmail.com
                </a>
                <a href="https://instagram.com/sandriitakenpo" target="_blank" class="contact-btn">
                    <i class="fa-brands fa-instagram mr-3 text-pink-500"></i> @sandriitakenpo
                </a>
                <a href="https://wa.me/34644758566" target="_blank" class="contact-btn">
                    <i class="fa-brands fa-whatsapp mr-3 text-green-500"></i> WhatsApp Directo
                </a>
            </div>
        </div>
    </div>

    <script>
        // ID único extraído de tu vídeo de YouTube
        const videoId = 'WgzakG_GYQ0';

        function openVideo() {
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('yt-player');
            
            // Construimos la URL con autoplay=1, mute=1 (exigido por navegadores para autoreproducir) y sin videos sugeridos
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0&modestbranding=1&controls=1`;
            
            modal.style.display = 'flex';
        }

        function closeVideo() {
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('yt-player');
            
            modal.style.display = 'none';
            iframe.src = ''; // Vaciamos la URL para detener por completo el vídeo al cerrar
        }

        window.onclick = function(event) {
            const modal = document.getElementById('video-modal');
            if (event.target == modal) {
                closeVideo();
            }
        }
    </script>
</body>
</html>
